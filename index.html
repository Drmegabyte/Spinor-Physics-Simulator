<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Critical for mobile apps to prevent zooming and scaling issues -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spinor Lattice Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #030303;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            overscroll-behavior: none; /* Prevents pull-to-refresh on mobile */
        }
        .matrix-bg {
            background: radial-gradient(circle at 50% 50%, #0a1f0a 0%, #000000 100%);
        }
        /* Custom Mobile Touch Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: #00ff41;
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #00ff4140;
            border-radius: 2px;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-4 border-b border-[#00ff41] shrink-0">
        <h1 class="text-xl md:text-2xl font-bold tracking-widest uppercase drop-shadow-[0_0_5px_rgba(0,255,65,0.8)]">Spinor Dynamics</h1>
        <p class="text-xs opacity-75">Dirac Belt / Clifford Lattice Simulator</p>
    </header>

    <!-- Metrics HUD -->
    <div class="grid grid-cols-3 gap-2 p-2 shrink-0 border-b border-[#00ff41]/50 bg-black/50">
        <div class="text-center p-2 border border-[#00ff41]/30 rounded">
            <div class="text-[10px] uppercase opacity-75">Alignment</div>
            <div id="hudAlignment" class="text-lg font-bold">0%</div>
        </div>
        <div class="text-center p-2 border border-[#00ff41]/30 rounded">
            <div class="text-[10px] uppercase opacity-75">Phase</div>
            <div id="hudPhase" class="text-lg font-bold">+</div>
        </div>
        <div class="text-center p-2 border border-[#00ff41]/30 rounded">
            <div class="text-[10px] uppercase opacity-75">Spinor Vector</div>
            <div id="hudVector" class="text-xs font-bold mt-1">(1.0, 0.0)</div>
        </div>
    </div>

    <!-- Physics Canvas Viewport -->
    <main class="flex-grow relative matrix-bg">
        <canvas id="simCanvas"></canvas>
        <!-- Overlay Phase Indicator -->
        <div id="overlayPhase" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-6xl font-bold opacity-10 pointer-events-none drop-shadow-[0_0_15px_rgba(0,255,65,1)]">+</div>
    </main>

    <!-- Mobile Controls Container -->
    <div class="p-4 shrink-0 bg-[#050505] border-t border-[#00ff41] flex flex-col gap-4 pb-8">
        
        <!-- Rotation Slider (0 to 720 degrees) -->
        <div>
            <div class="flex justify-between mb-2">
                <label class="text-xs font-bold uppercase">Spinor Rotation (0-720°)</label>
                <span id="lblRotation" class="text-xs font-bold">0°</span>
            </div>
            <input type="range" id="sliderRotation" min="0" max="720" value="0" step="1">
        </div>

        <!-- Coupling Strength -->
        <div>
            <div class="flex justify-between mb-2">
                <label class="text-xs font-bold uppercase">Lattice Coupling Strength</label>
                <span id="lblCoupling" class="text-xs font-bold">50%</span>
            </div>
            <input type="range" id="sliderCoupling" min="0" max="100" value="50" step="1">
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-4 mt-2">
            <button id="btnTrigger" class="flex-grow bg-[#00ff41] text-black font-bold uppercase py-3 rounded hover:bg-white transition-colors active:scale-95 shadow-[0_0_15px_rgba(0,255,65,0.4)]">
                Trigger Wave
            </button>
            <button id="btnReset" class="px-6 bg-transparent border border-[#00ff41] text-[#00ff41] font-bold uppercase py-3 rounded hover:bg-[#00ff41]/20 transition-colors active:scale-95">
                Reset
            </button>
        </div>

    </div>

    <script>
        // DOM Elements
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const sliderRotation = document.getElementById('sliderRotation');
        const sliderCoupling = document.getElementById('sliderCoupling');
        const lblRotation = document.getElementById('lblRotation');
        const lblCoupling = document.getElementById('lblCoupling');
        const btnTrigger = document.getElementById('btnTrigger');
        const btnReset = document.getElementById('btnReset');
        const hudAlignment = document.getElementById('hudAlignment');
        const hudPhase = document.getElementById('hudPhase');
        const hudVector = document.getElementById('hudVector');
        const overlayPhase = document.getElementById('overlayPhase');

        // Physics State
        let state = {
            rotation: 0,
            coupling: 0.5,
            waveStartTime: -9999, // Time in seconds
            nodes: [],
            cx: 0,
            cy: 0,
            spacing: 35
        };

        // Initialize Canvas & Grid
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            // Handle high-DPI mobile screens
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            state.cx = rect.width / 2;
            state.cy = rect.height / 2;

            initLattice(rect.width, rect.height);
        }

        function initLattice(width, height) {
            state.nodes = [];
            const cols = Math.floor(width / state.spacing);
            const rows = Math.floor(height / state.spacing);
            const startX = (width - (cols - 1) * state.spacing) / 2;
            const startY = (height - (rows - 1) * state.spacing) / 2;

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const px = startX + i * state.spacing;
                    const py = startY + j * state.spacing;
                    const dist = Math.hypot(px - state.cx, py - state.cy);
                    
                    // Exclude center to make room for main spinor
                    if (dist > state.spacing * 1.5) {
                        state.nodes.push({
                            x: px,
                            y: py,
                            dist: dist,
                            angle: Math.random() * Math.PI * 2
                        });
                    }
                }
            }
        }

        // Controls Logic
        sliderRotation.addEventListener('input', (e) => {
            state.rotation = parseInt(e.target.value);
            lblRotation.innerText = `${state.rotation}°`;
            updateHUD();
        });

        sliderCoupling.addEventListener('input', (e) => {
            state.coupling = parseInt(e.target.value) / 100;
            lblCoupling.innerText = `${e.target.value}%`;
        });

        btnTrigger.addEventListener('click', () => {
            state.waveStartTime = performance.now() / 1000;
        });

        btnReset.addEventListener('click', () => {
            state.rotation = 0;
            sliderRotation.value = 0;
            lblRotation.innerText = "0°";
            state.waveStartTime = -9999;
            state.nodes.forEach(n => n.angle = Math.random() * Math.PI * 2);
            updateHUD();
        });

        // HUD Updates
        function updateHUD() {
            // Spinor Math: 720 deg rotation = 360 deg physical rotation but inverted phase
            const isPhaseInverted = state.rotation >= 360;
            const phaseStr = isPhaseInverted ? "-" : "+";
            
            hudPhase.innerText = phaseStr;
            overlayPhase.innerText = phaseStr;
            
            // Visual feedback: Flash red on inversion, otherwise green
            if (isPhaseInverted) {
                hudPhase.classList.add('text-red-500');
                overlayPhase.classList.add('text-red-500');
                overlayPhase.classList.remove('text-[#00ff41]');
            } else {
                hudPhase.classList.remove('text-red-500');
                overlayPhase.classList.add('text-[#00ff41]');
                overlayPhase.classList.remove('text-red-500');
            }

            // Vector components (theta/2)
            const radHalf = (state.rotation * Math.PI) / 360;
            const u = Math.cos(radHalf).toFixed(2);
            const v = Math.sin(radHalf).toFixed(2);
            hudVector.innerText = `(${u}, ${v})`;
        }

        // Render Loop
        function draw() {
            const time = performance.now() / 1000;
            
            // Clear background
            ctx.fillStyle = '#050a05';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const rotRad = (state.rotation * Math.PI) / 180;
            const waveSpeed = 250; // pixels per second
            const waveRadius = (time - state.waveStartTime) * waveSpeed;
            
            let alignedCount = 0;

            // Draw Lattice
            state.nodes.forEach(node => {
                const isReached = node.dist < waveRadius;
                
                if (isReached) {
                    // Snap towards main spinor
                    let diff = rotRad - node.angle;
                    // Normalize difference to -PI to PI
                    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                    node.angle += diff * state.coupling * 0.2;
                } else {
                    // Quantum Jitter
                    node.angle += (Math.random() - 0.5) * 0.05;
                }

                // Check alignment
                let diffCheck = Math.abs(Math.atan2(Math.sin(rotRad - node.angle), Math.cos(rotRad - node.angle)));
                const isAligned = diffCheck < 0.2;
                if (isAligned) alignedCount++;

                // Draw Node
                ctx.save();
                ctx.translate(node.x, node.y);
                ctx.rotate(node.angle);
                
                if (isAligned) {
                    ctx.strokeStyle = '#00ff41';
                    ctx.globalAlpha = 1.0;
                    ctx.lineWidth = 2;
                } else {
                    ctx.strokeStyle = isReached ? '#008f25' : '#444444';
                    ctx.globalAlpha = 0.5;
                    ctx.lineWidth = 1;
                }
                
                // Draw T-Shape for orientation
                ctx.beginPath();
                ctx.moveTo(-6, 0);
                ctx.lineTo(6, 0);
                ctx.moveTo(0, 0);
                ctx.lineTo(0, -10);
                ctx.stroke();
                ctx.restore();
            });

            // Update Alignment HUD (throttle DOM updates slightly)
            if (Math.floor(time * 60) % 5 === 0) {
                const pct = ((alignedCount / Math.max(1, state.nodes.length)) * 100).toFixed(0);
                hudAlignment.innerText = `${pct}%`;
            }

            // Draw Wavefront Ring
            if (waveRadius > 0 && waveRadius < Math.max(canvas.width, canvas.height)) {
                ctx.beginPath();
                ctx.arc(state.cx, state.cy, waveRadius, 0, Math.PI * 2);
                ctx.strokeStyle = '#00ff41';
                ctx.lineWidth = 2;
                ctx.globalAlpha = Math.max(0, 1 - (waveRadius / 500));
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }

            // Draw Central Spinor
            ctx.save();
            ctx.translate(state.cx, state.cy);
            
            // Base tether circle
            ctx.beginPath();
            ctx.arc(0, 0, state.spacing * 1.2, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();
            ctx.strokeStyle = state.rotation >= 360 ? '#ff003c' : '#00ff41';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Spinor Arrow
            ctx.rotate(rotRad);
            ctx.strokeStyle = state.rotation >= 360 ? '#ff003c' : '#00ff41';
            ctx.lineWidth = 4;
            
            const vLen = state.spacing;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(vLen, 0);
            ctx.stroke();

            // Arrow Head
            ctx.beginPath();
            ctx.moveTo(vLen + 2, 0);
            ctx.lineTo(vLen - 6, -6);
            ctx.lineTo(vLen - 6, 6);
            ctx.closePath();
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fill();

            // Core dot
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            requestAnimationFrame(draw);
        }

        // Init & Run
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        updateHUD();
        requestAnimationFrame(draw);

    </script>
</body>
</html>
